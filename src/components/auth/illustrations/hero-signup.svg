        <path d="M520 420 L526 420 M523 417 L523 423" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" class="anim-pulse-soft" style="animation-delay: -1.2s;"/>
        <circle cx="40" cy="60" r="2" fill="white" opacity="0.6"/>
        <circle cx="540" cy="280" r="2" fill="white" opacity="0.5"/>
      </svg>
