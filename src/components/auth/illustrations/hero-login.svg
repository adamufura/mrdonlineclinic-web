      <svg viewBox="0 0 560 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="p3-desk" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#d4a574"/>
            <stop offset="1" stop-color="#8b6342"/>
          </linearGradient>
          <linearGradient id="p3-card" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#f1f5f9"/>
          </linearGradient>
          <linearGradient id="p3-mug" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fafbfc"/>
            <stop offset="1" stop-color="#e2e8f0"/>
          </linearGradient>
          <linearGradient id="p3-leaf" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#5eead4"/>
            <stop offset="1" stop-color="#14b8a6"/>
          </linearGradient>
          <linearGradient id="p3-pot" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#fda4af"/>
            <stop offset="1" stop-color="#e11d48"/>
          </linearGradient>
          <linearGradient id="p3-accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#5eead4"/>
            <stop offset="1" stop-color="#0ea5e9"/>
          </linearGradient>
          <linearGradient id="p3-coat" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#e0f2fe"/>
          </linearGradient>
          <linearGradient id="p3-skin" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#c89274"/>
            <stop offset="1" stop-color="#a06b4e"/>
          </linearGradient>
          <radialGradient id="p3-glow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#fde68a" stop-opacity="0.25"/>
            <stop offset="0.5" stop-color="#5eead4" stop-opacity="0.2"/>
            <stop offset="1" stop-color="#0ea5e9" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="p3-steam" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="white" stop-opacity="0.5"/>
            <stop offset="1" stop-color="white" stop-opacity="0"/>
          </radialGradient>
          <filter id="p3-shadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="10"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <circle cx="280" cy="220" r="280" fill="url(#p3-glow)"/>

        <!-- desk -->
        <path d="M40 360 L520 360 L540 400 L20 400 Z" fill="url(#p3-desk)" opacity="0.95"/>
        <line x1="40" y1="360" x2="520" y2="360" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
        <ellipse cx="280" cy="395" rx="240" ry="6" fill="rgba(0,0,0,0.15)"/>

        <!-- window light hint -->
        <rect x="80" y="60" width="120" height="180" rx="6" fill="rgba(254,243,199,0.15)" stroke="rgba(255,255,255,0.1)"/>
        <line x1="140" y1="60" x2="140" y2="240" stroke="rgba(255,255,255,0.1)"/>
        <line x1="80" y1="150" x2="200" y2="150" stroke="rgba(255,255,255,0.1)"/>
        <path d="M200 60 L320 200 L200 240 Z" fill="rgba(254,243,199,0.08)"/>

        <!-- Laptop -->
        <g transform="translate(170, 130)" filter="url(#p3-shadow)">
          <rect x="-10" y="220" width="240" height="14" rx="3" fill="#1a2942"/>
          <ellipse cx="110" cy="227" rx="14" ry="2" fill="#0a1628"/>
          <rect x="0" y="0" width="220" height="220" rx="10" fill="#1a2942"/>
          <rect x="6" y="6" width="208" height="208" rx="6" fill="url(#p3-card)"/>
          
          <rect x="18" y="18" width="60" height="14" rx="7" fill="rgba(14,165,233,0.1)"/>
          <circle cx="26" cy="25" r="2" fill="#0ea5e9" class="anim-pulse-soft"/>
          <text x="34" y="28" font-family="Geist, sans-serif" font-size="6" font-weight="600" fill="#0369a1">SECURE</text>
          
          <circle cx="110" cy="80" r="34" fill="url(#p3-accent)"/>
          <g transform="translate(110, 80)">
            <ellipse cx="0" cy="-2" rx="20" ry="22" fill="url(#p3-skin)"/>
            <path d="M-18 -8 Q-18 -22 0 -22 Q18 -22 18 -8 Q15 -16 0 -16 Q-15 -16 -18 -8" fill="#3a1f0d"/>
            <circle cx="-7" cy="-2" r="1.2" fill="#0a1628"/>
            <circle cx="7" cy="-2" r="1.2" fill="#0a1628"/>
            <path d="M-5 7 Q0 10 5 7" stroke="#0a1628" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M-15 18 Q-15 14 -10 14 L10 14 Q15 14 15 18 L15 22 L-15 22 Z" fill="url(#p3-coat)"/>
            <path d="M-3 14 L0 22 L3 14" fill="#1e3a5f"/>
          </g>
          
          <text x="110" y="140" text-anchor="middle" font-family="Fraunces, serif" font-size="13" font-weight="500" fill="#0a1628">Welcome back, Adaeze</text>
          <text x="110" y="154" text-anchor="middle" font-family="Geist, sans-serif" font-size="8" fill="#64748b">Dr. Adeyemi is online now</text>
          
          <rect x="34" y="166" width="152" height="22" rx="11" fill="#fafbfc" stroke="#e2e8f0"/>
          <circle cx="46" cy="177" r="4" fill="none" stroke="#64748b" stroke-width="1.2"/>
          <path d="M46 173 L46 177 L48 179" stroke="#64748b" stroke-width="1.2" stroke-linecap="round" fill="none"/>
          <circle cx="60" cy="177" r="1.5" fill="#0a1628"/>
          <circle cx="66" cy="177" r="1.5" fill="#0a1628"/>
          <circle cx="72" cy="177" r="1.5" fill="#0a1628"/>
          <circle cx="78" cy="177" r="1.5" fill="#0a1628"/>
          <circle cx="84" cy="177" r="1.5" fill="#0a1628"/>
          <circle cx="90" cy="177" r="1.5" fill="#0a1628"/>
          
          <rect x="34" y="196" width="152" height="14" rx="7" fill="url(#p3-accent)"/>
          <text x="110" y="205" text-anchor="middle" font-family="Geist, sans-serif" font-size="7" font-weight="600" fill="white">Sign in</text>
        </g>

        <!-- Coffee mug -->
        <g transform="translate(70, 280)" filter="url(#p3-shadow)">
          <ellipse cx="32" cy="-5" rx="8" ry="12" fill="url(#p3-steam)" class="anim-float-sm"/>
          <ellipse cx="42" cy="-15" rx="6" ry="10" fill="url(#p3-steam)" class="anim-float-sm" style="animation-delay: -1s;"/>
          <ellipse cx="22" cy="-12" rx="5" ry="9" fill="url(#p3-steam)" class="anim-float-sm" style="animation-delay: -2s;"/>
          <path d="M5 5 L5 65 Q5 75 15 75 L55 75 Q65 75 65 65 L65 5 Z" fill="url(#p3-mug)"/>
          <ellipse cx="35" cy="8" rx="28" ry="5" fill="#3a1f0d"/>
          <ellipse cx="35" cy="8" rx="22" ry="3" fill="#5a2f18"/>
          <path d="M65 18 Q82 18 82 35 Q82 52 65 52" fill="none" stroke="url(#p3-mug)" stroke-width="6" stroke-linecap="round"/>
          <text x="35" y="50" text-anchor="middle" font-family="Fraunces, serif" font-style="italic" font-size="13" fill="#0ea5e9">m</text>
          <circle cx="42" cy="45" r="1.5" fill="#5eead4"/>
        </g>

        <!-- Plant -->
        <g transform="translate(420, 230)" filter="url(#p3-shadow)">
          <g class="anim-float-sm">
            <ellipse cx="40" cy="0" rx="8" ry="22" fill="url(#p3-leaf)" transform="rotate(-30 40 0)"/>
            <ellipse cx="40" cy="-5" rx="9" ry="26" fill="url(#p3-leaf)" transform="rotate(0 40 0)"/>
            <ellipse cx="40" cy="0" rx="8" ry="22" fill="url(#p3-leaf)" transform="rotate(30 40 0)"/>
            <ellipse cx="35" cy="10" rx="7" ry="18" fill="#0d9488" transform="rotate(-60 35 10)"/>
            <ellipse cx="45" cy="10" rx="7" ry="18" fill="#0d9488" transform="rotate(60 45 10)"/>
            <ellipse cx="28" cy="25" rx="6" ry="14" fill="url(#p3-leaf)" transform="rotate(-80 28 25)"/>
            <ellipse cx="52" cy="25" rx="6" ry="14" fill="url(#p3-leaf)" transform="rotate(80 52 25)"/>
            <line x1="40" y1="-30" x2="40" y2="18" stroke="#0d9488" stroke-width="0.8" opacity="0.6"/>
          </g>
          <path d="M18 40 L62 40 L58 90 L22 90 Z" fill="url(#p3-pot)"/>
          <ellipse cx="40" cy="40" rx="22" ry="4" fill="#be123c"/>
          <line x1="22" y1="58" x2="58" y2="58" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
        </g>

        <!-- Notebook -->
        <g transform="translate(160, 340)" filter="url(#p3-shadow)">
          <rect x="0" y="0" width="100" height="50" rx="3" fill="#fafbfc" transform="rotate(-5 50 25)"/>
          <line x1="10" y1="12" x2="80" y2="9" stroke="#e2e8f0" stroke-width="0.8" transform="rotate(-5 50 25)"/>
          <line x1="10" y1="22" x2="80" y2="19" stroke="#e2e8f0" stroke-width="0.8" transform="rotate(-5 50 25)"/>
          <line x1="10" y1="32" x2="60" y2="29" stroke="#e2e8f0" stroke-width="0.8" transform="rotate(-5 50 25)"/>
          <rect x="60" y="-10" width="50" height="5" rx="2" fill="#1e3a5f" transform="rotate(15 85 -8)"/>
          <rect x="100" y="-10" width="8" height="5" rx="2" fill="#fda4af" transform="rotate(15 85 -8)"/>
        </g>

        <!-- Book stack -->
        <g transform="translate(330, 340)" filter="url(#p3-shadow)">
          <rect x="0" y="0" width="90" height="40" rx="3" fill="#0369a1"/>
          <rect x="-3" y="6" width="90" height="40" rx="3" fill="#0ea5e9"/>
          <rect x="-6" y="12" width="90" height="40" rx="3" fill="#38bdf8"/>
          <text x="39" y="38" text-anchor="middle" font-family="Fraunces, serif" font-style="italic" font-size="10" fill="white">notes</text>
        </g>

        <!-- Welcome back badge -->
        <g class="anim-float" transform="translate(30, 80)">
          <rect width="156" height="56" rx="18" fill="white" filter="url(#p3-shadow)"/>
          <g transform="translate(28, 28)">
            <circle r="14" fill="#fde68a"/>
            <path d="M-7 -2 L-7 6 M-3 -5 L-3 6 M1 -6 L1 6 M5 -4 L5 6" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
            <path d="M-9 6 Q0 12 9 6" fill="#92400e"/>
          </g>
          <text x="50" y="24" font-family="Geist, sans-serif" font-size="8" font-weight="600" fill="#0a1628">Welcome back</text>
          <text x="50" y="36" font-family="Geist, sans-serif" font-size="7" fill="#64748b">Last visit · 3 days ago</text>
          <text x="50" y="48" font-family="Geist, sans-serif" font-size="7" fill="#0369a1" font-weight="500">Continue care →</text>
        </g>

        <!-- Calendar reminder -->
        <g class="anim-float-sm" transform="translate(395, 60)" style="animation-delay: -1.5s;">
          <rect width="140" height="86" rx="16" fill="white" filter="url(#p3-shadow)"/>
          <rect x="14" y="14" width="38" height="42" rx="6" fill="#fef3c7"/>
          <rect x="14" y="14" width="38" height="10" rx="6" fill="#f59e0b"/>
          <text x="33" y="22" text-anchor="middle" font-family="Geist, sans-serif" font-size="5" font-weight="600" fill="white">NOVEMBER</text>
          <text x="33" y="46" text-anchor="middle" font-family="Fraunces, serif" font-size="16" font-weight="600" fill="#0a1628">14</text>
          <text x="58" y="22" font-family="Geist, sans-serif" font-size="7" font-weight="600" fill="#0a1628">Today</text>
          <text x="58" y="34" font-family="Geist, sans-serif" font-size="7" fill="#64748b">Follow-up with</text>
          <text x="58" y="44" font-family="Geist, sans-serif" font-size="7" font-weight="500" fill="#0a1628">Dr. Adeyemi</text>
          <rect x="58" y="50" width="68" height="14" rx="7" fill="rgba(94,234,212,0.2)"/>
          <text x="92" y="59" text-anchor="middle" font-family="Geist, sans-serif" font-size="7" font-weight="600" fill="#0d9488">In 2 hours</text>
          <rect x="14" y="64" width="112" height="2" rx="1" fill="#e2e8f0"/>
          <rect x="14" y="70" width="76" height="2" rx="1" fill="#e2e8f0"/>
          <text x="14" y="80" font-family="Geist, sans-serif" font-size="6" fill="#64748b">Set reminder · Reschedule</text>
        </g>

        <circle cx="50" cy="200" r="3" fill="#5eead4" class="anim-pulse-soft"/>
        <circle cx="530" cy="180" r="3" fill="#38bdf8" class="anim-pulse-soft" style="animation-delay: -1s;"/>
        <path d="M25 350 L31 350 M28 347 L28 353" stroke="#fde68a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
