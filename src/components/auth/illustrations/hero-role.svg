      <svg viewBox="0 0 560 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="p1-coat" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset="1" stop-color="#e0f2fe"/>
          </linearGradient>
          <linearGradient id="p1-skin1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f4c2a1"/>
            <stop offset="1" stop-color="#e8a87c"/>
          </linearGradient>
          <linearGradient id="p1-skin2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#c89274"/>
            <stop offset="1" stop-color="#a06b4e"/>
          </linearGradient>
          <linearGradient id="p1-screen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#0a2545"/>
            <stop offset="1" stop-color="#04132a"/>
          </linearGradient>
          <linearGradient id="p1-accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#5eead4"/>
            <stop offset="1" stop-color="#0ea5e9"/>
          </linearGradient>
          <radialGradient id="p1-glow" cx="0.5" cy="0.5" r="0.5">
            <stop offset="0" stop-color="#5eead4" stop-opacity="0.5"/>
            <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
          </radialGradient>
          <filter id="p1-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="10"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <circle cx="280" cy="230" r="220" fill="url(#p1-glow)"/>

        <g class="anim-spin-slow" style="transform-origin: 280px 230px;">
          <circle cx="280" cy="230" r="200" fill="none" stroke="rgba(94,234,212,0.15)" stroke-dasharray="2 8"/>
          <circle cx="80" cy="230" r="3" fill="#5eead4"/>
          <circle cx="480" cy="230" r="2.5" fill="#38bdf8"/>
        </g>

        <!-- Laptop -->
        <g transform="translate(140, 110)" filter="url(#p1-shadow)">
          <path d="M-10 250 L290 250 L300 270 L-20 270 Z" fill="#1a2942"/>
          <ellipse cx="140" cy="260" rx="20" ry="2" fill="#04132a"/>
          <rect x="0" y="0" width="280" height="250" rx="14" fill="#1a2942"/>
          <rect x="6" y="6" width="268" height="238" rx="10" fill="url(#p1-screen)"/>
          
          <circle cx="20" cy="20" r="3" fill="#fda4af"/>
          <circle cx="32" cy="20" r="3" fill="#fcd34d"/>
          <circle cx="44" cy="20" r="3" fill="#5eead4"/>
          <rect x="200" y="14" width="64" height="12" rx="6" fill="rgba(94,234,212,0.15)"/>
          <circle cx="208" cy="20" r="2" fill="#5eead4" class="anim-pulse-soft"/>
          <text x="220" y="23" font-family="Geist, sans-serif" font-size="7" fill="#5eead4">LIVE</text>
          
          <!-- main doctor video -->
          <rect x="14" y="34" width="170" height="160" rx="10" fill="#04132a"/>
          <g transform="translate(99, 114)">
            <path d="M-55 80 Q-55 55 -30 50 L30 50 Q55 55 55 80 L55 90 L-55 90 Z" fill="url(#p1-coat)"/>
            <path d="M-15 50 Q-20 65 -8 70 Q0 73 8 70 Q20 65 15 50" fill="none" stroke="#0a1628" stroke-width="2" stroke-linecap="round"/>
            <circle cx="-8" cy="72" r="3" fill="#0a1628"/>
            <circle cx="8" cy="72" r="3" fill="#0a1628"/>
            <circle cx="0" cy="82" r="4" fill="#5eead4"/>
            <path d="M-12 55 L0 70 L12 55" fill="#1e3a5f"/>
            <rect x="-8" y="35" width="16" height="20" fill="url(#p1-skin1)"/>
            <ellipse cx="0" cy="20" rx="22" ry="26" fill="url(#p1-skin1)"/>
            <path d="M-22 12 Q-22 -8 0 -8 Q22 -8 22 12 Q22 5 18 0 Q12 -4 0 -4 Q-12 -4 -18 0 Q-22 5 -22 12" fill="#2d1810"/>
            <circle cx="-9" cy="20" r="6" fill="none" stroke="#0a1628" stroke-width="1.5"/>
            <circle cx="9" cy="20" r="6" fill="none" stroke="#0a1628" stroke-width="1.5"/>
            <line x1="-3" y1="20" x2="3" y2="20" stroke="#0a1628" stroke-width="1.5"/>
            <circle cx="-9" cy="20" r="1.5" fill="#0a1628"/>
            <circle cx="9" cy="20" r="1.5" fill="#0a1628"/>
            <path d="M-5 32 Q0 35 5 32" stroke="#0a1628" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M-12 28 Q0 38 12 28 Q10 36 0 38 Q-10 36 -12 28" fill="#2d1810" opacity="0.5"/>
          </g>
          <rect x="22" y="178" width="80" height="12" rx="6" fill="rgba(0,0,0,0.5)"/>
          <circle cx="29" cy="184" r="2" fill="#5eead4"/>
          <text x="36" y="187" font-family="Geist, sans-serif" font-size="7" font-weight="500" fill="white">Dr. Adeyemi</text>
          
          <!-- patient inset -->
          <rect x="192" y="34" width="76" height="76" rx="10" fill="#1e3a5f"/>
          <g transform="translate(230, 75)">
            <path d="M-22 35 Q-22 22 -12 20 L12 20 Q22 22 22 35 L22 40 L-22 40 Z" fill="#7c5d3f"/>
            <ellipse cx="0" cy="6" rx="13" ry="15" fill="url(#p1-skin2)"/>
            <path d="M-13 0 Q-13 -10 0 -10 Q13 -10 13 0 Q13 -5 8 -7 Q0 -8 -8 -7 Q-13 -5 -13 0" fill="#1a0e08"/>
            <circle cx="-5" cy="6" r="1" fill="#0a1628"/>
            <circle cx="5" cy="6" r="1" fill="#0a1628"/>
            <path d="M-3 13 Q0 15 3 13" stroke="#0a1628" stroke-width="1" fill="none" stroke-linecap="round"/>
          </g>
          <rect x="198" y="98" width="44" height="8" rx="4" fill="rgba(0,0,0,0.5)"/>
          <text x="220" y="104" text-anchor="middle" font-family="Geist, sans-serif" font-size="6" font-weight="500" fill="white">You</text>
          
          <!-- chat panel -->
          <rect x="192" y="118" width="76" height="76" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)"/>
          <rect x="198" y="124" width="46" height="14" rx="7" fill="rgba(94,234,212,0.2)"/>
          <rect x="201" y="128" width="22" height="2" rx="1" fill="white" opacity="0.7"/>
          <rect x="201" y="132" width="32" height="2" rx="1" fill="white" opacity="0.5"/>
          <rect x="216" y="142" width="46" height="14" rx="7" fill="rgba(56,189,248,0.25)"/>
          <rect x="219" y="146" width="28" height="2" rx="1" fill="white" opacity="0.7"/>
          <rect x="219" y="150" width="20" height="2" rx="1" fill="white" opacity="0.5"/>
          <rect x="198" y="160" width="34" height="14" rx="7" fill="rgba(94,234,212,0.2)"/>
          <circle cx="207" cy="167" r="1.5" fill="white" class="anim-typing-1"/>
          <circle cx="213" cy="167" r="1.5" fill="white" class="anim-typing-2"/>
          <circle cx="219" cy="167" r="1.5" fill="white" class="anim-typing-3"/>
          <rect x="198" y="180" width="64" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
          
          <!-- controls -->
          <circle cx="80" cy="220" r="12" fill="rgba(255,255,255,0.08)"/>
          <path d="M76 217 L76 223 L85 220 Z" fill="white"/>
          <circle cx="115" cy="220" r="12" fill="rgba(255,255,255,0.08)"/>
          <rect x="111" y="216" width="8" height="8" rx="2" fill="white"/>
          <circle cx="150" cy="220" r="12" fill="#ef4444"/>
          <rect x="146" y="218" width="8" height="4" rx="1" fill="white" transform="rotate(135 150 220)"/>
          <circle cx="185" cy="220" r="12" fill="rgba(255,255,255,0.08)"/>
          <circle cx="185" cy="220" r="4" fill="white"/>
          <circle cx="220" cy="220" r="12" fill="rgba(255,255,255,0.08)"/>
          <text x="220" y="224" text-anchor="middle" font-family="Geist, sans-serif" font-size="10" fill="white">⋯</text>
        </g>

        <!-- Verified clinician badge -->
        <g class="anim-float" transform="translate(20, 50)">
          <rect width="140" height="46" rx="23" fill="white" filter="url(#p1-shadow)"/>
          <circle cx="23" cy="23" r="14" fill="url(#p1-accent)"/>
          <path d="M16 23 L21 28 L31 18" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="44" y="20" font-family="Geist, sans-serif" font-size="9" font-weight="600" fill="#0a1628">Verified clinician</text>
          <text x="44" y="32" font-family="Geist, sans-serif" font-size="8" fill="#64748b">MDCN licensed</text>
        </g>

        <!-- prescription card -->
        <g class="anim-float-sm" transform="translate(415, 30)" style="animation-delay: -2s;">
          <rect width="130" height="76" rx="14" fill="white" filter="url(#p1-shadow)"/>
          <rect x="12" y="12" width="106" height="2" rx="1" fill="#0a1628"/>
          <rect x="12" y="18" width="60" height="2" rx="1" fill="#94a3b8"/>
          <line x1="12" y1="28" x2="118" y2="28" stroke="#e2e8f0" stroke-width="0.5"/>
          <text x="12" y="42" font-family="Fraunces, serif" font-size="13" font-weight="500" fill="#0369a1">℞</text>
          <rect x="26" y="36" width="80" height="2" rx="1" fill="#0a1628"/>
          <rect x="26" y="42" width="60" height="2" rx="1" fill="#64748b"/>
          <rect x="12" y="52" width="106" height="2" rx="1" fill="#e2e8f0"/>
          <rect x="12" y="58" width="80" height="2" rx="1" fill="#e2e8f0"/>
          <rect x="12" y="64" width="94" height="2" rx="1" fill="#e2e8f0"/>
        </g>

        <!-- appointment card -->
        <g class="anim-float" transform="translate(28, 330)" style="animation-delay: -1.5s;">
          <rect width="150" height="76" rx="14" fill="white" filter="url(#p1-shadow)"/>
          <rect x="12" y="12" width="36" height="52" rx="8" fill="#5eead4"/>
          <text x="30" y="28" text-anchor="middle" font-family="Geist, sans-serif" font-size="6" font-weight="600" fill="#04132a">THU</text>
          <text x="30" y="50" text-anchor="middle" font-family="Fraunces, serif" font-size="20" font-weight="600" fill="#04132a">14</text>
          <rect x="56" y="14" width="80" height="3" rx="1.5" fill="#0a1628"/>
          <text x="56" y="32" font-family="Geist, sans-serif" font-size="8" font-weight="500" fill="#0a1628">Follow-up</text>
          <text x="56" y="44" font-family="Geist, sans-serif" font-size="7" fill="#64748b">10:30 AM · Video</text>
          <rect x="56" y="52" width="36" height="14" rx="7" fill="rgba(14,165,233,0.1)"/>
          <text x="74" y="61" text-anchor="middle" font-family="Geist, sans-serif" font-size="7" font-weight="600" fill="#0369a1">Confirmed</text>
        </g>

        <!-- vitals card -->
        <g class="anim-float-sm" transform="translate(420, 320)" style="animation-delay: -0.8s;">
          <rect width="130" height="86" rx="14" fill="white" filter="url(#p1-shadow)"/>
          <g transform="translate(20, 32)">
            <path class="anim-heartbeat" d="M0 0 C-7 -10, -20 -2, 0 12 C20 -2, 7 -10, 0 0 Z" fill="#fda4af"/>
          </g>
          <text x="44" y="20" font-family="Geist, sans-serif" font-size="7" fill="#64748b">Heart rate</text>
          <text x="44" y="36" font-family="Fraunces, serif" font-size="20" font-weight="500" fill="#0a1628">72<tspan font-size="10" fill="#64748b"> bpm</tspan></text>
          <polyline points="12,68 24,68 30,58 36,78 44,50 52,68 64,68 70,62 78,68 118,68" fill="none" stroke="#fda4af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </g>

        <circle cx="50" cy="180" r="4" fill="#5eead4" class="anim-pulse-soft"/>
        <circle cx="490" cy="180" r="3" fill="#38bdf8" class="anim-pulse-soft" style="animation-delay: -1s;"/>
        <circle cx="40" cy="280" r="2" fill="#fff" opacity="0.5"/>
        <path d="M510 280 L516 280 M513 277 L513 283" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M30 420 L36 420 M33 417 L33 423" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
