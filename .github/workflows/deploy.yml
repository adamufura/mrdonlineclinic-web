name: Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            cd ~/htdocs/clinic.mrdonline.ng
            git fetch origin main
            git reset --hard origin/main
            npm ci || npm install
            rm -rf dist
            npm run build
            test -f dist/index.html
            grep -q 'favicon.png' dist/index.html
            rm -rf assets
            rm -f index.html favicon.svg favicon.png apple-touch-icon.png icons.svg
            cp -r dist/* .
            grep -q 'favicon.png' index.html
            test -f favicon.png
            echo "Deploy OK: $(head -1 index.html)"
